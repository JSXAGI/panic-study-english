<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>英語学習アプリ</title>

      <script src="https://cdn.tailwindcss.com"></script>

      <link rel="stylesheet" href="style.css">

      <script src="data.js"></script>
   </head>
   <body>
      <div id="app"></div>
      <div id="display-area" class="container" style="padding-top: 0;"></div>
      <script>
         const config = {
           background_color: "#fef3c7",
           surface_color: "#ffffff",
           text_color: "#1e293b",
           primary_action_color: "#f59e0b",
           secondary_action_color: "#8b5cf6",
           font_size: 16,
           app_title: "🌟 英語マスター",
           welcome_message: "楽しく英語を学ぼう！"
         };           
                 
         // ボタンを押した時の動き
         function startLearning(type) {
           const area = document.getElementById('display-area');
           let content = "";
         
           if (type === 'panic') {
             // パニック文法が選ばれたら、データを画面に書き出す
             panicData.forEach(item => {
               content += `
                 <div class="card" style="background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px;">
                   <h3 style="color: #ff4500;">【${item.title}】</h3>
                   <p><strong>${item.eng}</strong></p>
                   <div class="panic-comment">👦 ${item.comment}</div>
                 </div>
               `;
             });
           } else {
             content = "<p style='color:white;'>（ここに単語や基本文法の処理を繋げるゾ）</p>";
           }
         
           area.innerHTML = content;
         }
         
         let currentView = 'home';
         let currentWordIndex = 0;
         let currentQuestionIndex = 0;
         let showAnswer = false;
         let selectedLevel = 'all';
         
         function getFilteredWords() {
           if (selectedLevel === 'all') return vocabularyData;
           return vocabularyData.filter(w => w.level === selectedLevel);
         }
         
         function renderCurrentView() {
           const app = document.getElementById('app');
           const baseSize = config.font_size;
           const bgColor = config.background_color;
           const surfaceColor = config.surface_color;
           const textColor = config.text_color;
           const primaryColor = config.primary_action_color;
           const secondaryColor = config.secondary_action_color;
         
           let content = '';
         
           if (currentView === 'home') {
             const beginnerWords = vocabularyData.filter(w => w.level === 'beginner');
             const intermediateWords = vocabularyData.filter(w => w.level === 'intermediate');
             const advancedWords = vocabularyData.filter(w => w.level === 'advanced');
         
             content = `
             <div class="container" style="background: transparent !important; padding-top: 30px !important;">
               <header class="header" style="background: transparent !important; border: none !important; box-shadow: none !important; text-align: center; margin-bottom: 50px; display: block !important;">
                 <h1 class="title" style="font-size: 38px !important; font-weight: 900 !important; color: #15DAF6 !important; text-shadow: 2px 2px 0px #000000, 4px 4px 8px rgba(0,0,0,0.8) !important; display: block !important;">
                   ${config.app_title}
                 </h1>
                 <p class="subtitle" style="color: #ffffff !important; font-weight: bold !important; text-shadow: 1px 1px 4px #000000 !important; display: block !important;">
                   ${config.welcome_message}
                 </p>
               </header>
         
               <div class="content">
                 <div class="grid"> <button onclick="switchView('vocabulary')" class="card-btn btn-word">
                     <div style="font-size: 2.5rem;">📖</div>
                     <div style="font-weight: bold; margin-top: 5px;">コツコツ単語</div>
                   </button>
                  
                   <button onclick="switchView('grammar')" class="card-btn btn-gram">
                     <div style="font-size: 2.5rem;">✍️</div>
                     <div style="font-weight: bold; margin-top: 5px;">しっかり文法</div>
                   </button>
         
                   <button onclick="startLearning('panic')" class="card-btn btn-panic">
                     <div style="font-size: 2.8rem; text-shadow: 2px 2px 0px #ffffff;">💥</div>
                     <div style="font-weight: bold; margin-top: 5px; color: #ff4500; 
                 text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;">
         パニック学習
         </div>
                   </button>
         
                   <div class="stats-container" style="background: rgba(24, 61, 178, 0.15); border-left: 15px solid #15DAF6 !important; border: 1px solid rgba(255,255,255,0.8); padding: 0px 30px ; border-radius: 0 15px 15px 0; margin-top: 0 !important; color: white; display: flex; flex-direction: column; justify-content: center; min-height: 100%;">
                     <h2 style="font-size: 1.2rem; color: #ffffff; margin-bottom: 0px; text-shadow: 1px 1px 2px #000;">⭐ 学習コンテンツMEMO</h2>
         <div style="font-size: 0.9rem;">
         <p>🌱 初級: ${beginnerWords.length} / 🌿 中級: ${intermediateWords.length} / 🌳 上級: ${advancedWords.length}</p>
         <p style="margin-top: 5px; font-weight: bold; color: #F0A50F; text-shadow: 1px 1px 2px #000;">📢 英語読み上げ機能搭載だゾ！🙋</p>
         <p style="margin-top: 5px; font-weight: bold; color: #F0A50F; text-shadow: 1px 1px 2px #000;">💥 世界初＞パニック文法お披露目だゾ！</p>
         <p style="margin-top: 5px; font-weight: bold; color: #F0A50F; text-shadow: 1px 1px 2px #000;">🎲 全データシャッフルで学習可能だゾ！</p>
                     </div>
                   </div> 
                 </div> 
         </div>
             </div>
           `;
           } else if (currentView === 'vocabulary') {
             const filteredWords = getFilteredWords();
             const word = filteredWords[currentWordIndex];
         
             const levelEmoji = word.level === 'beginner' ? '🌱' : word.level === 'intermediate' ? '🌿' : '🌳';
             const levelText = word.level === 'beginner' ? '初級' : word.level === 'intermediate' ? '中級' : '上級';
             const levelColor = word.level === 'beginner' ? '#10b981' : word.level === 'intermediate' ? '#3b82f6' : '#8b5cf6';
         
             content = `
               <div class="container" style="background: rgba(255, 255, 255, 0.85); border-radius: 20px;">
                 <div class="top-bar">
                   <button onclick="switchView('home')" class="btn" style="background-color: ${secondaryColor}; font-size: ${baseSize}px;">
                     ← ホーム
                   </button>
                   <div class="filter-buttons">
                     <button onclick="filterLevel('all')" class="filter-btn" style="background-color: ${selectedLevel === 'all' ? primaryColor : surfaceColor}; color: ${selectedLevel === 'all' ? 'white' : textColor}; font-size: ${baseSize * 0.9}px; border-color: ${primaryColor};">
                       全て
                     </button>
                     <button onclick="filterLevel('beginner')" class="filter-btn" style="background-color: ${selectedLevel === 'beginner' ? primaryColor : surfaceColor}; color: ${selectedLevel === 'beginner' ? 'white' : textColor}; font-size: ${baseSize * 0.9}px; border-color: ${primaryColor};">
                       🌱初級
                     </button>
                     <button onclick="filterLevel('intermediate')" class="filter-btn" style="background-color: ${selectedLevel === 'intermediate' ? primaryColor : surfaceColor}; color: ${selectedLevel === 'intermediate' ? 'white' : textColor}; font-size: ${baseSize * 0.9}px; border-color: ${primaryColor};">
                       🌿中級
                     </button>
                     <button onclick="filterLevel('advanced')" class="filter-btn" style="background-color: ${selectedLevel === 'advanced' ? primaryColor : surfaceColor}; color: ${selectedLevel === 'advanced' ? 'white' : textColor}; font-size: ${baseSize * 0.9}px; border-color: ${primaryColor};">
                       🌳上級
                     </button>
                     <button onclick="startRandomLearning()" class="filter-btn" style="background-color: #f59e0b; color: white; border-color: #ffcc00; font-size: ${baseSize * 0.9}px; font-weight: bold;">
                       🎲シャッフル
                     </button>
                   </div>
                 </div>
         
                 <div style="text-align: center; margin-bottom: 12px;">
                   <span class="level-badge" style="background-color: ${levelColor}; font-size: ${baseSize}px;">
                     ${levelEmoji} ${levelText} - ${word.category}
                   </span>
                   
                   <p class="progress-text" style="font-size: 1.1rem; color: #ffffff; font-weight: bold; text-shadow: 1px 1px 2px #000;">
                     ${currentWordIndex + 1} / ${filteredWords.length}
                   </p>
                 </div>
         
                 <div class="center-content">
                   <div class="word-card" onclick="speak('${word.english.replace(/'/g, "'")}'); toggleAnswer()" style="background: linear-gradient(135deg, ${surfaceColor} 0%, ${bgColor} 50%, ${surfaceColor} 100%); border-color: ${primaryColor};">
                     ${!showAnswer ? `
                       <div style="text-align: center;">
                         <div class="word-emoji">${word.emoji}</div>
                         <p class="word-label" style="font-size: ${baseSize}px; color: ${textColor};">英語</p>
                         <h2 class="word-main" style="font-size: ${baseSize * 2.5}px; color: ${textColor};">${word.english}</h2>
                         <p class="word-pronunciation" style="font-size: ${baseSize}px; font-weight: bold; color: ${secondaryColor};">[ ${word.pronunciation} ]</p> 
                         <div class="tap-hint" style="font-size: ${baseSize * 0.9}px; color: #000000;">👆 タップで発音＆和訳を見るゾ！🔊</div>
                       </div>
                     ` : `
                       <div style="text-align: center;">
                         <div class="word-emoji">${word.emoji}</div>
                         <p class="word-label" style="font-size: ${baseSize}px; color: ${textColor};">日本語の意味</p>
                         <h2 class="word-main" style="font-size: ${baseSize * 2.5}px; color: ${primaryColor};">${word.japanese}</h2>
                         <div class="answer-box" style="background-color: ${bgColor};">
                           <p class="answer-text" style="font-size: ${baseSize * 1.2}px; color: ${textColor};">英語: ${word.english}</p>
                           <p class="answer-detail" style="font-size: ${baseSize * 0.9}px; color: ${secondaryColor};">発音: [ ${word.pronunciation} ]</p>
                         </div>
                       </div>
                     `}
                   </div>
         
                   <div class="navigation">
                     <button onclick="previousWord()" class="nav-btn-prev" style="background-color: ${surfaceColor}; color: ${textColor}; font-size: ${baseSize * 1.1}px; border-color: ${secondaryColor};">
                       ← 前の単語
                     </button>
                     <button onclick="nextWord()" class="nav-btn-next" style="background-color: ${primaryColor}; font-size: ${baseSize * 1.1}px;">
                       次の単語 →
                     </button>
                   </div>
                 </div>
               </div>
             `;
           } else if (currentView === 'grammar') {
             const question = grammarQuestions[currentQuestionIndex];
             const qLevelEmoji = question.level === 'beginner' ? '🌱' : question.level === 'intermediate' ? '🌿' : '🌳';
             const qLevelText = question.level === 'beginner' ? '初級' : question.level === 'intermediate' ? '中級' : '上級';
         
             content = `
               <div class="container" style="background: rgba(255, 255, 255, 0.85); border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                 <div class="top-bar">
                   <button onclick="switchView('home')" class="btn" style="background-color: ${secondaryColor}; font-size: ${baseSize}px; border-radius: 10px;">
                     🏠 ホーム
                   </button>
         
                   <button onclick="shuffleGrammarQuestion()" class="btn" style="background-color: #f59e0b; color: white; border-color: #ffcc00; margin-left: 10px; font-weight: bold; font-size: ${baseSize}px; border-radius: 10px;">
                 🎲 全レベルごちゃまぜシャッフル
               </button>
         
                   <span class="level-badge" style="background-color: #fff; font-size: ${baseSize * 0.6}px; border: 2px solid #15DAF6; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-left: auto;">
                     👽 PC利用で文法学習は＜ブラウザ75％縮小で学習＞が推奨だゾ！👦
                   </span>
                 </div>
         
                 <div class="center-content">
                   <div class="question-card" style="background: linear-gradient(135deg, ${surfaceColor} 0%, ${bgColor} 100%); border-color: ${secondaryColor};">
                     <div class="question-icon">✏️</div>
                     <h2 class="question-text" style="font-size: ${baseSize * 1.8}px; color: ${textColor};">${question.question}</h2>
                     
                     <div class="options">
                       ${question.options.map((option, index) => `
                         <button onclick="checkAnswer(${index})" class="option-btn" style="background-color: ${surfaceColor}; border-color: ${primaryColor}; color: ${textColor}; font-size: ${baseSize * 1.1}px;">
                           ${String.fromCharCode(65 + index)}. ${option}
                         </button>
                       `).join('')}
                     </div>
         
                     ${showAnswer ? `
                       <div class="explanation-box">
                         <p class="explanation-title">✅ 正解: ${question.options[question.correct]}</p>
                         <p class="explanation-text">${question.explanation}</p>
                         <button onclick="nextQuestion()" class="next-question-btn" style="background-color: ${primaryColor}; font-size: ${baseSize * 1.1}px;">
                           次の問題へ →
                         </button>
                       </div>
                     ` : ''}
                   </div>
                 </div>
               </div>
             `;
           }
         
           app.innerHTML = content;
         }
         
         function switchView(view) {
           currentView = view;
           showAnswer = false;
           currentWordIndex = 0;
           currentQuestionIndex = 0;
           selectedLevel = 'all';
           renderCurrentView();
         }
         
         // --- ここから追加 ---
         function startRandomLearning() {
           // 1. データを混ぜる
           vocabularyData.sort(() => 0.5 - Math.random());
         
           // 2. 表示をリセットして再描画
           selectedLevel = 'all'; // 「全て」の状態に戻す
           currentWordIndex = 0;   // 1枚目に戻す
           showAnswer = false;     // 答えは隠す
           renderCurrentView();    // 👈 これで画面を更新！
         
           alert("単語帳をぐちゃぐちゃに混ぜたゾ！🎲");
         }
         function startGrammarRandom() {
           // 1. 文法データを混ぜる
           grammarQuestions.sort(() => 0.5 - Math.random());
         
           // 2. 状態をリセット
           currentQuestionIndex = 0;
           showAnswer = false;
         
           // 3. 再描画
           renderCurrentView();
         
           alert("文法問題もバラバラに入れ替えたゾ！🎲");
         }
         
         // --- ここまで追加 ---
         
         function filterLevel(level) {
           selectedLevel = level;
           currentWordIndex = 0;
           showAnswer = false;
           renderCurrentView();
         }
         
         function toggleAnswer() {
           showAnswer = !showAnswer;
           renderCurrentView();
         }
         
         function nextWord() {
           const filteredWords = getFilteredWords();
           currentWordIndex = (currentWordIndex + 1) % filteredWords.length;
           showAnswer = false;
           renderCurrentView();
         }
         
         function previousWord() {
           const filteredWords = getFilteredWords();
           currentWordIndex = (currentWordIndex - 1 + filteredWords.length) % filteredWords.length;
           showAnswer = false;
           renderCurrentView();
         }
         
         function checkAnswer(selectedIndex) {
           showAnswer = true;
           renderCurrentView();
         }
         
         function nextQuestion() {
           currentQuestionIndex = (currentQuestionIndex + 1) % grammarQuestions.length;
           showAnswer = false;
           renderCurrentView();
         }
         
         // --- 既存の renderCurrentView(); のところ ---
         renderCurrentView();
      </script>
      <script>
         window.addEventListener('load', function () {
           // 1. しんちゃん語録
           const successMsgs = ["✨ ほっほーい！大正解だゾ！", "✨ ななこおねえさ〜ん！やったゾ！", "✨ アクション仮面もビックリだゾ！"];
           const failMsgs = ["👊 げんこつ！やり直しだゾ！", "❌ おバカ〜！母ちゃんに言いつけるゾ！", "❌ シロのほうが賢いゾ..."];
         
           // 2. 画面の最前面に「絶対に消されない」ボードを作成
           const shinBoard = document.createElement('div');
           shinBoard.id = 'shin-special-board';
           shinBoard.style.cssText = `
           position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
           width: 85%; max-width: 350px; z-index: 10000;
           background: white; border: 4px solid #f59e0b; border-radius: 20px;
           padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
           display: none; pointer-events: none;
         `;
           document.body.appendChild(shinBoard);
         
           // --- 監督お任せ！コンボお祭りシステム発動だゾ！ ---
           let comboCount = 0; // 連続正解数を数えるゾ
         
           const originalCheck = window.checkAnswer;
           window.checkAnswer = function (selectedIndex) {
             if (typeof originalCheck === 'function') originalCheck(selectedIndex);
         
             const question = grammarQuestions[currentQuestionIndex];
             const isCorrect = (selectedIndex === question.correct);
         
             if (isCorrect) {
               comboCount++; // 正解ならコンボ＋1！
               let textToSpeak = question.english || question.question.replace(/___/g, question.options[question.correct]);
               speak(textToSpeak);
             } else {
               comboCount = 0; // 間違えたら「げんこつ」でリセットだゾ...
               window.speechSynthesis.cancel();
             }
         
             setTimeout(() => {
               let msg = "";
               let specialEvent = false;
         
               // --- 【お任せイベント】コンボ数による分岐だゾ！ ---
               if (!isCorrect) {
                 msg = "❌ おバカ〜！母ちゃんのげんこつ(リセット)だゾ！😭";
               } else if (comboCount === 3) {
                 msg = "🔥 3連勝！おケツがムズムズしてきたゾ...！";
               } else if (comboCount === 5) {
                 msg = "✨ 5連勝！アクション仮面モード突入だゾ！ワッハッハ！";
                 launchHanabi(); // 5連勝で花火のご褒美だゾ！
               } else if (comboCount === 10) {
                 msg = "💖 10連勝！ななこおねえさ〜ん！オラを見て〜！😍";
                 specialEvent = true; // 10連勝で奇跡を起こすゾ
               } else {
                 msg = isCorrect ? successMsgs[Math.floor(Math.random() * successMsgs.length)] : "";
               }
         
               // ボードの表示
               shinBoard.innerHTML = `
               <div style="font-size: 40px; margin-bottom: 10px;">${isCorrect ? (comboCount >= 10 ? '😍' : (comboCount >= 5 ? '🦸‍♂️' : '👦')) : '🤮'}</div>
               <div style="color: #f59e0b; font-weight: bold; font-size: 1.2rem; line-height: 1.4;">
                 ${comboCount > 1 ? `<span style="display:block; font-size:0.8rem; color:#ff4500;">🔥 ${comboCount} COMBO!</span>` : ''}
                 ${msg}
               </div>
             `;
               shinBoard.style.display = 'block';
               shinBoard.style.animation = 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
         
               // 🌟 10連勝の時だけの「ななこおねえさん級」超豪華演出
               if (specialEvent) {
                 for (let i = 0; i < 5; i++) {
                   setTimeout(() => { launchHanabi(); }, i * 300); // 花火5連発だゾ！
                 }
                 document.body.style.boxShadow = "inset 0 0 100px #ff69b4"; // 画面がピンクに染まるゾ
                 setTimeout(() => { document.body.style.boxShadow = "none"; }, 3000);
               }
         
               setTimeout(() => { shinBoard.style.display = 'none'; }, 3000);
         
               if (isCorrect) {
                 createKira(true);
               } else {
                 createKira(false);
                 const app = document.getElementById('app');
                 if (app) {
                   app.style.animation = "shake 0.5s";
                   setTimeout(() => { app.style.animation = ""; }, 500);
                 }
               }
             }, 100);
           };
           // 4. アニメーション等の関数（スタンプ方式に大改造だゾ！）
           window.createKira = function (isCorrect) {
             const stamp = document.createElement('div');
             stamp.className = 'stamp-mark';
             // 正解なら「💮」、不正解なら「❌」を表示するゾ
             stamp.innerText = isCorrect ? '💮' : '❌';
             document.body.appendChild(stamp);
         
             // 1秒後にスッと消して、要素をきれいに掃除するゾ
             setTimeout(() => {
               stamp.style.transition = 'opacity 0.5s';
               stamp.style.opacity = '0';
               setTimeout(() => stamp.remove(), 500);
             }, 1000);
           };
         
           const s = document.createElement('style');
           s.innerHTML = `
           @keyframes shake { 0%,100%{transform:translateX(0);} 10%,30%,50%,70%,90%{transform:translateX(-10px);} 20%,40%,60%,80%{transform:translateX(10px);} }
           @keyframes fall { 0%{transform:translateY(0) rotate(0deg);opacity:1;} 100%{transform:translateY(110vh) rotate(360deg);opacity:0;} }
           @keyframes popIn { 0%{transform:translate(-50%, -20%) scale(0.5);opacity:0;} 100%{transform:translate(-50%, 0) scale(1);opacity:1;} }
         `;
           document.head.appendChild(s);
         });
         
         // パニック学習専用の表示関数（最強ランダム10件バージョン！）
         window.startLearning = function (type) {
           if (type === 'panic') {
             const app = document.getElementById('app');
         
             // --- 嵐を呼ぶ100件のフルデータだゾ！ ---
             const allPanicData = [
               { title: "現在進行形", eng: "I am playing with Shiro now.", comment: "今、シロと綿あめごっこしてる最中だゾ！邪魔しちゃダメだゾ〜。" },
               { title: "助動詞 can", eng: "I can write my name with my hip.", comment: "オラ、おケツでお名前が書けるんだゾ。これって世界に通用する才能だゾ？" },
               { title: "比較級", eng: "Chocobi is better than green peppers.", comment: "ピーマンより、チョコビの方が100万倍いいに決まってるゾ！" },
               { title: "助動詞 must", eng: "I must find a way to skip the nap.", comment: "お昼寝をサボる方法を、必死で考えなきゃいけないゾ。これは死活問題だゾ！" },
               { title: "助動詞 may", eng: "May I have another Chocobi?", comment: "チョコビをもう一箱いただいてもよろしいでしょうか？丁寧にお願いすれば母ちゃんも断れないはずだゾ。" },
               { title: "助動詞 should", eng: "You should not put green peppers in my curry.", comment: "オラのカレーにピーマンを入れるべきではないゾ。それは国際問題に発展するゾ。" },
               { title: "受動態", eng: "The cake was eaten by me yesterday.", comment: "ケーキはオラによって食べられました。証拠隠滅は完璧だったはずなのに、なぜ母ちゃんにバレたんだゾ？" },
               { title: "現在完了(完了)", eng: "I have already finished my homework (maybe).", comment: "宿題はもう終わったゾ（たぶん）。オラの「たぶん」は、天気予報よりは当たるゾ。" },
               { title: "現在完了(継続)", eng: "I have loved Nanako-oneesan for a long time.", comment: "オラ、長い間ななこおねえさんを愛し続けてるゾ。恋に生きる5歳児だゾ。" },
               { title: "不定詞(目的)", eng: "I went to the park to see Nanako-oneesan.", comment: "ななこおねえさんに会うために公園へ行ったゾ。シロの散歩はついでだゾ。" },

             const shuffled = [...allPanicData].sort(() => 0.5 - Math.random());

             // --- 監督の目で見抜いた「最高の白」を反映！ ---

         // --- 🎆 打ち上げ花火ギミック（監督専用・隠しボタン） ---
         function launchHanabi() {
           // 🕵️ 【新設】門番：3%の確率を潜り抜けた時だけ、下に進めるゾ！
           if (Math.random() > 0.2) return;
         
           // 1. 夜空（暗転レイヤー）の作成
           const nightSky = document.createElement('div');
           nightSky.style.cssText = `
         position: fixed; top: 0; left: 0; width: 100%; height: 100%;
         background: rgba(0, 0, 0, 0.9); z-index: 20000;
         display: flex; align-items: center; justify-content: center;
         transition: opacity 0.5s;
         `;
           document.body.appendChild(nightSky);
         
           // 2. 「たまや〜！」メッセージ
           const msg = document.createElement('div');
           msg.innerHTML = "🎆 たまや〜〜だゾ！ 🎆";
           msg.style.cssText = "color: white; font-size: 2rem; font-weight: bold; position: absolute; bottom: 20%;";
           nightSky.appendChild(msg);
         
           // 3. 火花を散らす（30個の光の粒）
           const colors = ['#FF0000', '#FFD700', '#00FF00', '#00BFFF', '#FF69B4'];
           for (let i = 0; i < 30; i++) {
             const particle = document.createElement('div');
             const color = colors[Math.floor(Math.random() * colors.length)];
             particle.style.cssText = `
           position: absolute; width: 10px; height: 10px; background: ${color};
           border-radius: 50%; box-shadow: 0 0 10px ${color};
         `;
             nightSky.appendChild(particle);
         
             // 飛び散るアニメーション
             const angle = Math.random() * Math.PI * 2;
             const velocity = 5 + Math.random() * 10;
             let posX = 0; let posY = 0;
         
             const move = setInterval(() => {
               posX += Math.cos(angle) * velocity;
               posY += Math.sin(angle) * velocity;
               particle.style.transform = `translate(${posX}px, ${posY}px)`;
               particle.style.opacity = parseFloat(particle.style.opacity || 1) - 0.02;
               if (parseFloat(particle.style.opacity) <= 0) {
                 clearInterval(move);
                 particle.remove();
               }
             }, 20);
           }
         
           // 4. 自動で元の画面に戻る（1.5秒後）
           setTimeout(() => {
             nightSky.style.opacity = '0';
             setTimeout(() => nightSky.remove(), 500);
           }, 1500);
         }
         // 文法問題を全レベルごちゃまぜにしてシャッフルする魔法だゾ！

           currentQuestionIndex = 0;

           // 監督のコードでは renderGrammar ではなく renderCurrentView が正解だゾ！
           renderCurrentView();
         
           // 4. 合図を出す
           alert("全100問をバラバラに混ぜたゾ！何が出るかはお楽しみだゾ！🎲");
         }
         
         // --- 読み上げ機能（追加） ---
         function speak(text) {
           // 実行中の読み上げがあればキャンセルして最初から流すゾ
           window.speechSynthesis.cancel();
         
           const utterance = new SpeechSynthesisUtterance(text);
           utterance.lang = 'en-US'; // 英語に設定
           utterance.rate = 0.9;     // ほんの少しゆっくりめで聞き取りやすく
           window.speechSynthesis.speak(utterance);
         }
         
      </script>
   </body>
